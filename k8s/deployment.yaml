apiVersion: apps/v1
kind: Deployment
metadata:
  name: tuni-portfolio
  namespace: tuni-portfolio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tuni-portfolio
  template:
    metadata:
      labels:
        app: tuni-portfolio
    spec:
      containers:
        - name: tuni-portfolio
          image: ghcr.io/etunidev/tuni-portfolio:c601eef5b06d8e706171f359c8884572db979326
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
